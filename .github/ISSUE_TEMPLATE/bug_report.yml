name: Bug report
description: Report a reproducible defect in Kavi.
title: 'bug: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Security-sensitive reports do not belong in public issues. If this bug
        may expose secrets, credentials, private data, unsafe file access, SSRF,
        sandbox escape, or other security impact, stop here and follow
        `SECURITY.md` instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A concise description of the defect.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Android
        - iOS
        - Web
        - CI only
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproduction path.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include device, OS version, app build, Node version, and anything else relevant.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets, tokens, private data, hostnames, and credentials before posting.
