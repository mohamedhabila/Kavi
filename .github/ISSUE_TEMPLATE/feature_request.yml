name: Feature request
description: Propose a user-facing or developer-facing improvement to Kavi.
title: 'feat: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user, contributor, or maintainer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Explain who benefits and what tradeoffs exist.
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution interest
      options:
        - label: I am willing to help implement this.
